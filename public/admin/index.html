<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gerencie os produtos cadastrados.">
    <title>Adminstração Sistema A.S.M Informática</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body class="admin-page">
    <header class="mb-4">
        <site-header active="admin"></site-header>
    </header>

    <div class="container pb-5">
        <main>
            <div id="statusAlert"></div>

            <section class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                <div>
                    <h1 class="h2 mb-1">Serviços cadastrados</h1>
                    <p class="text-muted mb-0">Crie, edite ou exclua serviços que aparecem na página inicial.</p>
                </div>
                <div class="d-flex gap-2">
                    <a class="btn btn-primary" href="/admin/create.html">Novo serviço</a>
                    <a class="btn btn-outline-primary" href="/admin/contacts.html">Mensagens</a>
                    <button class="btn btn-outline-secondary" id="logoutBtn">Sair</button>
                </div>
            </section>

            <section class="card shadow-sm border-0 p-3 p-md-4">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>Nome</th><th>Status</th><th class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="productsBody">
                            <tr><td colspan="3" class="text-center py-3">
                                <div class="spinner-border spinner-border-sm text-primary" role="status">
                                    <span class="visually-hidden">Carregando...</span>
                                </div>
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <footer class="bg-dark text-white py-4">
        <site-footer></site-footer>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/assets/js/admin/index.js"></script>
</body>
</html>
