<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mensagens recebidas pelo formulário de contato.">
    <title>Mensagens – A.S.M Informática</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body class="admin-page">
    <header class="mb-4">
        <site-header active="admin"></site-header>
    </header>

    <div class="container pb-5">
        <main>
            <section class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                <div>
                    <h1 class="h2 mb-1">Mensagens recebidas</h1>
                    <p class="text-muted mb-0">Veja os contatos enviados pelo formulário público.</p>
                </div>
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-primary" href="/admin/">Produtos</a>
                    <button class="btn btn-outline-secondary" id="logoutBtn">Sair</button>
                </div>
            </section>

            <section class="card shadow-sm border-0 p-3 p-md-4">
                <div id="contactsList">
                    <div class="text-center py-3">
                        <div class="spinner-border spinner-border-sm text-primary" role="status">
                            <span class="visually-hidden">Carregando...</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <footer class="bg-dark text-white py-4">
        <site-footer></site-footer>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/assets/js/admin/contacts.js"></script>
</body>
</html>
