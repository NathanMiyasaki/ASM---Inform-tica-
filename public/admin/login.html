<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acesso restrito à área administrativa.">
    <title>Login – Sistema A.S.M Informática</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/style.css" rel="stylesheet">
</head>
<body class="admin-page">
    <header class="mb-4">
        <site-header></site-header>
    </header>

    <div class="container pb-5">
        <main class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card shadow-sm border-0 p-4">
                    <h1 class="h3 mb-3">Entrar no admin</h1>

                    <div id="errorAlert"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label" for="email">E-mail</label>
                            <input class="form-control" id="email" name="email" type="email">
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="password">Senha</label>
                            <input class="form-control" id="password" name="password" type="password">
                        </div>
                        <button class="btn btn-primary w-100" type="submit" id="submitBtn">Entrar</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <footer class="bg-dark text-white py-4">
        <site-footer></site-footer>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/assets/js/admin/login.js"></script>
</body>
</html>
